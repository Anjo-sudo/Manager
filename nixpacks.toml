# Root-level nixpacks config — tells Railway how to build the backend
# from the repo root without needing to set Root Directory in the UI.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["cd backend && npm install"]

[phases.build]
cmds = [
  "cd backend && npx prisma generate",
  "cd backend && npx prisma db push"
]

[start]
cmd = "cd backend && node server.js"
